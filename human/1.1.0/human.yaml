name: human
description: Human SDRF template with human-specific sample metadata fields. Must be combined with a technology template (ms-proteomics or affinity-proteomics).
version: 1.1.0
extends: base
usable_alone: false
layer: sample
mutually_exclusive_with:
  - vertebrates
  - invertebrates
  - plants
columns:
  - name: characteristics[disease]
    description: Disease state of the sample
    requirement: required
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - mondo
            - efo
            - doid
            - pato
          error_level: warning
          description: The disease should be a valid MONDO, EFO, DOID, or PATO ontology term. Use 'normal' (PATO:0000461) for healthy samples.
          examples:
            - normal
            - breast cancer
            - diabetes mellitus
            - Alzheimer disease

  - name: characteristics[ancestry category]
    description: Ancestry or ethnic background of the donor
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - hancestro
            - efo
          error_level: warning
          description: The ancestry category should be a valid HANCESTRO or EFO ontology term
          examples:
            - European
            - African
            - Asian
            - Hispanic or Latin American

  - name: characteristics[age]
    description: Age of the donor at sample collection
    requirement: required
    allow_not_applicable: false
    allow_not_available: true
    allow_anonymized: true
    allow_pooled: true
    validators:
      - validator_name: pattern
        params:
          # Age format: number + unit in strict Y>M>W>D order, with optional range
          # Examples: 45Y, 6M, 3W, 14D, 30Y6M, 6M2W, 40Y-50Y, 6M-12M
          # Also allows "not available", "anonymized", or "pooled"
          pattern: ^((\d+[Yy](\d+[Mm](\d+[Ww](\d+[Dd])?)?)?|\d+[Mm](\d+[Ww](\d+[Dd])?)?|\d+[Ww](\d+[Dd])?|\d+[Dd])(-((\d+[Yy](\d+[Mm](\d+[Ww](\d+[Dd])?)?)?|\d+[Mm](\d+[Ww](\d+[Dd])?)?|\d+[Ww](\d+[Dd])?|\d+[Dd])))?|not available|anonymized|pooled)$
          case_sensitive: false
          description: Age should be in format like 45Y, 6M, 3W, 14D, 30Y6M (Y>M>W>D order), or ranges like 40Y-50Y, 6M-12M. Use "not available" if unknown, "anonymized" if redacted, or "pooled" for pooled samples.
          examples:
            - 45Y
            - 6M
            - 30Y6M
            - 30Y6M2W
            - 40Y-50Y
            - not available
            - anonymized
            - pooled

  - name: characteristics[sex]
    description: Biological sex of the donor
    requirement: required
    allow_not_applicable: true
    allow_not_available: true
    allow_anonymized: true
    allow_pooled: true
    validators:
      - validator_name: values
        params:
          values:
            - male
            - female
            - intersex
          error_level: error
          description: Sex should be one of the allowed values.

  - name: characteristics[developmental stage]
    description: Developmental stage of the donor
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - hsapdv
            - efo
          error_level: warning
          description: The developmental stage should be a valid HsapDv or EFO ontology term
          examples:
            - adult
            - embryonic stage
            - fetal stage
            - infant stage

  - name: characteristics[individual]
    description: Unique identifier for the donor individual
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    allow_anonymized: true
    allow_pooled: true
    validators:
      - validator_name: identifier
        params:
          special_values: [anonymized, pooled]
          error_level: error
          description: Patient or individual identifier
          examples:
            - patient_001
            - donor-A1
            - subject_12
            - anonymized
            - pooled

  - name: characteristics[biosample accession number]
    description: BioSample accession number for the sample (e.g., SAMN or SAMEA identifiers)
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: accession
        params:
          format: biosample
          error_level: error
          description: BioSample accession
          examples:
            - SAMN12345678
            - SAMEA12345678
            - SAMD1234567
