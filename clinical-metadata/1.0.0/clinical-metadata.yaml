name: clinical-metadata
description: SDRF template for clinical study samples with treatment, demographics, and lifestyle metadata. Applicable to any organism. Combine with organism template (human, vertebrates) and technology template (ms-proteomics, affinity-proteomics).
documentation: |
  The clinical-metadata template captures treatment, demographics, and lifestyle data for
  interventional and observational studies. It extends sample-metadata and is also the parent
  of oncology-metadata.

  Key guidance:
  - For drug studies, use `characteristics[compound]` + `characteristics[dose]` +
    `characteristics[exposure duration]` together for detailed pharmacological annotation.
  - `characteristics[treatment]`: Broader treatment description. Use `untreated` for controls.
  - `characteristics[treatment status]`: When the sample was collected relative to treatment
    (pre-treatment, on treatment, post-treatment, treatment naive).
  - `characteristics[treatment response]`: Clinical response assessment (complete response,
    partial response, progressive disease, stable disease).
  - `characteristics[sampling time]`: Time of collection with unit (0 hour, 24 hour,
    7 day). Critical for time-course and pharmacokinetic studies.
  - `characteristics[sampling site]`: Anatomical context (tumor, normal tissue adjacent to
    tumor). Important for matched tissue designs.
  - `characteristics[genotype]`: Known genetic variants (BRCA1 mutation carrier, wild type).
  - `characteristics[phenotype]`: Observable characteristics (drug resistant, HER2-positive).
contributors:
  - Yasset Perez-Riverol (yperez@ebi.ac.uk) - EMBL-EBI
  - Deepti Jaiswal Kundu (jaiswal@ebi.ac.uk) - EMBL-EBI
