name: dda-acquisition
description: SDRF template for Data-dependent acquisition (DDA) experiments. Extends ms-proteomics with DDA-specific columns.
version: 1.1.0
extends: ms-proteomics
usable_alone: false
layer: experiment
mutually_exclusive_with:
  - dia-acquisition
columns:
  - name: comment[dissociation method]
    description: Fragmentation method used
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - ms
            - pride
          parent_term: MS:1000044
          error_level: warning
          description: Dissociation method should be a child term of MS:1000044
          examples:
            - HCD
            - CID
            - ETD
            - EThcD
            - ETciD
