version: 1.0.0
extends: ms-proteomics@>=1.1.0
usable_alone: false
layer: experiment
columns:
  - name: comment[chemical cross-linking coupled with ms]
    ontology_accession: PRIDE:0000430
    description: MS-based cross-linking methodology used to identify this as a crosslinking dataset
    requirement: recommended
    allow_not_applicable: false
    allow_not_available: false
    validators:
      - validator_name: values
        params:
          values:
            - cross-linking mass spectrometry
          error_level: warning
          description: Cross-linking MS methodology

  # =============================================================================
  # REQUIRED COLUMNS - Essential for XL-MS data analysis
  # =============================================================================

  # Enrichment process inherited from sample-metadata, overridden to recommended for XL-MS
  - name: characteristics[enrichment process]
    requirement: recommended

  # Data acquisition: crosslinker details
  - name: comment[cross-linker]
    ontology_accession: XLMOD:00004
    description: |
      Cross-linker compound with structured properties for analysis tools.
      Format: NT=name;AC=accession;CL=cleavable;TA=targets;MH/ML=stub masses
      Uses XLMOD ontology (parent term XLMOD:00004).
    requirement: required
    allow_not_applicable: false
    allow_not_available: false
    validators:
      - validator_name: structured_kv
        params:
          separator: ";"
          fields:
            - key: NT
              value: ".+"
            - key: AC
              value: "(XLMOD|CHEBI|UNIMOD):\\d+"
          error_level: error
          description: "Cross-linker in ontology format: NT=name;AC=ontology:accession"
          examples:
            - "NT=DSS;AC=XLMOD:02001"
            - "NT=BS3;AC=XLMOD:02000"
            - "NT=DSSO;AC=XLMOD:02010;CL=yes;TA=K,S,T,Y,nterm;MH=54.01;ML=85.98"
            - "NT=EDC;AC=XLMOD:02009;CL=no;TA=K,D,E"

  - name: comment[dissociation method]
    ontology_accession: MS:1000044
    description: |
      Fragmentation method used in MS2. Critical for cleavable crosslinkers (DSSO, DSBU)
      which generate diagnostic stub ions under specific fragmentation conditions.
    requirement: required
    allow_not_applicable: false
    allow_not_available: false
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - ms
            - pride
          parent_term: MS:1000044
          error_level: error
          description: Dissociation method should be a child term of MS:1000044
          examples:
            - HCD
            - CID
            - ETD
            - EThcD
            - stepped HCD

  # =============================================================================
  # RECOMMENDED COLUMNS - Useful for analysis configuration
  # =============================================================================

  - name: comment[collision energy]
    ontology_accession: MS:1000045
    description: Collision energy used for fragmentation. Important for cleavable crosslinker analysis.
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^\d+(\.\d+)?%?\s*(NCE|eV)(;\d+(\.\d+)?%?\s*(NCE|eV))*$|^stepped\s+.+$
          description: "Collision energy format: {value} {unit} where unit is NCE or eV. For stepped collision energies, use semicolon-separated values or 'stepped' prefix."
          examples:
            - 30 NCE
            - 30% NCE
            - 27 eV
            - 25 NCE;27 NCE;30 NCE
            - 25% NCE;27% NCE;30% NCE
            - stepped 27+-6%

  - name: comment[crosslink enrichment method]
    ontology_accession: PRIDE:0000838
    description: Method used to enrich crosslinked peptides before MS analysis
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - pride
            - ms
          error_level: warning
          description: Enrichment method (PRIDE:0000586)
          examples:
            - size exclusion chromatography
            - strong cation exchange chromatography
            - high-pH reversed-phase chromatography
            - FAIMS

  # =============================================================================
  # OPTIONAL COLUMNS - Sample preparation details (not required for analysis)
  # =============================================================================

  - name: characteristics[crosslink distance]
    ontology_accession: PRIDE:0000948
    description: Maximum Cα-Cα distance constraint provided by the crosslinker (for structural interpretation)
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [Å]
          error_level: error
          description: Distance should be a number followed by Å (Angstrom)
          examples:
            - 30 Å
            - 26.4 Å
            - 11.4 Å

  - name: comment[crosslinker concentration]
    ontology_accession: PRIDE:0000951
    description: Concentration of crosslinking reagent used
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [mM, uM, µM]
          error_level: error
          description: Concentration with unit
          examples:
            - 2 mM
            - 500 uM
            - 1 mM

  - name: characteristics[crosslinking reaction time]
    ontology_accession: PRIDE:0000949
    description: Duration of the crosslinking reaction
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [min, h, s]
          error_level: error
          description: Time should be a number followed by unit
          examples:
            - 30 min
            - 1 h
            - 45 min

  - name: characteristics[crosslinking temperature]
    ontology_accession: PRIDE:0000950
    description: Temperature at which crosslinking was performed
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: ["°C"]
          allow_negative: true
          special_values: [room temperature]
          error_level: error
          description: Temperature should be a number followed by °C (e.g., 25°C or 25 °C)
          examples:
            - 25°C
            - 4°C
            - 37°C
            - room temperature

  - name: comment[crosslinker to protein ratio]
    ontology_accession: PRIDE:0000952
    description: Molar ratio of crosslinker to protein
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^\d+:\d+(\s+\w+/\w+)?$
          description: Ratio format (e.g., 50:1 or 1:1 w/w)
          examples:
            - 50:1
            - 100:1
            - 1:1 w/w

  - name: comment[quenching reagent]
    ontology_accession: PRIDE:0000953
    description: Reagent used to quench the crosslinking reaction
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Chemical name of quenching reagent
          examples:
            - Tris-HCl
            - ammonium bicarbonate
            - glycine
