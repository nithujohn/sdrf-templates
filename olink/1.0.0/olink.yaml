name: olink
description: SDRF template for Olink Proximity Extension Assay (PEA) experiments. Extends affinity-proteomics with Olink-specific columns.
documentation: |
  The olink template captures Proximity Extension Assay (PEA) specific metadata for
  Olink experiments. PEA uses paired antibodies with oligonucleotide tags — binding
  events are detected via qPCR or sequencing.

  Key guidance:
  - `comment[olink panel]`: Required. The specific panel used (Target 96 Inflammation,
    Explore 384 Cardiometabolic, Explore 1536, Explore 3072).
  - `comment[olink platform]`: Required. The platform version (Olink Target 96,
    Olink Explore 384, Olink Explore HT, Olink Reveal).
  - `comment[npx normalization]`: Recommended. How NPX values were normalized
    (plate control normalized, intensity normalized, bridge normalized, not normalized).
  - `comment[olink lot number]`: Optional. Reagent lot for traceability.
  - Inherited from affinity-proteomics: `comment[sample matrix]` (serum, plasma, CSF),
    `comment[quantification unit]` (NPX), `comment[normalization method]`.

  Olink data uses Normalized Protein eXpression (NPX) units on a log2 scale.
  Mutually exclusive with somascan.
contributors:
  - Yasset Perez-Riverol (yperez@ebi.ac.uk) - EMBL-EBI
  - Deepti Jaiswal Kundu (jaiswal@ebi.ac.uk) - EMBL-EBI
