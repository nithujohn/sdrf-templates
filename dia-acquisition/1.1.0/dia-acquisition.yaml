name: dia-acquisition
description: SDRF template for Data-independent acquisition (DIA) experiments. Extends ms-proteomics with DIA-specific columns.
documentation: |
  The dia-acquisition template restricts the acquisition method to Data-independent
  acquisition and adds DIA-specific window parameters.

  Key guidance:
  - `comment[proteomics data acquisition method]`: Automatically restricted to
    `Data-independent acquisition`. This is enforced by the template.
  - `comment[scan window lower limit]` / `comment[scan window upper limit]`: The overall
    m/z range of the DIA method (e.g., 400-1200 for a typical SWATH experiment).
  - `comment[isolation window width]`: Width of individual isolation windows in m/z.
    Common values: 25 (wide SWATH), 8 (narrow windows), 4 (high-resolution DIA).
  - `comment[dia method]`: The specific DIA variant used. Common values:
    SWATH-MS, diaPASEF (Bruker timsTOF), MSE (Waters), All ion fragmentation.

  This template inherits all ms-proteomics columns (instrument, label, cleavage agent, etc.).
  The ms-proteomics range columns (ms min/max mz, rt, im) are also relevant for DIA methods.
contributors:
  - Yasset Perez-Riverol (yperez@ebi.ac.uk) - EMBL-EBI
