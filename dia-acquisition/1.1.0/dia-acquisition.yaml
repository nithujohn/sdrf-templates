  - Timo Sachsenberg (timo.sachsenberg@uni-tuebingen.de) - University of Tübingen
version: 1.1.0
extends: ms-proteomics@>=1.1.0
usable_alone: false
layer: experiment
columns:
  - name: comment[proteomics data acquisition method]
    ontology_accession: PRIDE:0000659
    description: Mass spectrometry acquisition method (restricted to DIA for this template)
    requirement: required
    allow_not_applicable: false
    allow_not_available: false
    validators:
      - validator_name: single_cardinality_validator
        params: {}
      - validator_name: values
        params:
          values:
            - Data-independent acquisition
          error_level: error
          description: This template requires Data-independent acquisition

  - name: comment[scan window lower limit]
    ontology_accession: MS:1000501
    description: Lower m/z limit of the DIA scan window
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^\d+(\.\d+)?$
          description: m/z value as a number
          examples:
            - 400
            - 350.5

  - name: comment[scan window upper limit]
    ontology_accession: MS:1000500
    description: Upper m/z limit of the DIA scan window
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^\d+(\.\d+)?$
          description: m/z value as a number
          examples:
            - 1200
            - 1000

  - name: comment[isolation window width]
    ontology_accession: MS:1000792
    description: Width of the isolation window in m/z units
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^\d+(\.\d+)?$
          description: Width in m/z
          examples:
            - 25
            - 8
            - 4

  - name: comment[dia method]
    ontology_accession: PRIDE:0000450
    description: Specific DIA method variant used
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - pride
          error_level: warning
          description: Should be a valid PRIDE ontology term for DIA methods
          examples:
            - SWATH-MS
            - MSE
            - All ion fragmentation
            - diaPASEF
