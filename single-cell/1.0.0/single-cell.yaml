version: 1.0.0
extends: ms-proteomics@>=1.1.0
usable_alone: false
layer: experiment
columns:
  # Core columns inherited from ms-proteomics/sample-metadata/base: organism, organism part, cell type, biological replicate
  # Disease and organism-specific columns come from sample templates (human, vertebrates, etc.)

  # Override sample type to recommended for single-cell (carrier, reference, empty wells)
  - name: comment[sample type]
    ontology_accession: PRIDE:0000895
    requirement: recommended

  # ==========================================================================
  # REQUIRED COLUMNS (per Nature Methods SCP guidelines)
  # ==========================================================================

  - name: characteristics[single cell isolation protocol]
    ontology_accession: EFO:0010214
    description: Method used to isolate single cells (FACS, cellenONE, LCM, etc.)
    requirement: required
    allow_not_applicable: true
    allow_not_available: false
    validators:
      - validator_name: values
        params:
          values:
            - FACS
            - cellenONE
            - microfluidics
            - laser capture microdissection
            - manual picking
            - nanoPOTS
            - droplet microfluidics
            - acoustic droplet ejection
          error_level: warning
          description: Single cell isolation method

  - name: characteristics[cell identifier]
    ontology_accession: EFO:0010197
    description: Unique identifier for each single cell within the experiment. Required per SCP guidelines for tracking cells through analysis.
    requirement: required
    allow_not_applicable: true
    allow_not_available: false
    validators:
      - validator_name: identifier
        params:
          charset: "[A-Za-z0-9_.-]"
          special_values: [carrier, reference, empty]
          error_level: error
          description: Cell identifier
          examples:
            - cell_001
            - SC_A1
            - well_B3
            - barcode_ATCGATCG
            - carrier
            - reference

  # ==========================================================================
  # RECOMMENDED COLUMNS (per Nature Methods SCP guidelines)
  # ==========================================================================

  - name: comment[sample preparation batch]
    description: Batch identifier for sample preparation (plate, chip, processing batch). Critical for batch effect correction.
    requirement: recommended

  - name: characteristics[cells per well]
    ontology_accession: UO:0000317
    description: Number of cells per well/reaction. Use 1 for true single cells, higher numbers for small pools.
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^\d+$
          description: Number of cells
          examples:
            - 1
            - 5
            - 10
            - 100

  - name: comment[carrier channel]
    ontology_accession: PRIDE:0000941
    description: TMT/TMTpro channel used for the carrier proteome
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: TMT channel label for carrier
          examples:
            - TMT131C
            - TMTpro134N
            - TMT126

  - name: comment[reference channel]
    ontology_accession: PRIDE:0000942
    description: TMT/TMTpro channel used for the reference sample (for normalization across sets)
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: TMT channel label for reference
          examples:
            - TMT131N
            - TMTpro133C
            - TMT127N

  # ==========================================================================
  # OPTIONAL COLUMNS - Flow Cytometry Data (per Nature Methods guidelines)
  # ==========================================================================

  - name: characteristics[forward scatter]
    ontology_accession: PRIDE:0000937
    description: Forward scatter (FSC) value from flow cytometry - proxy for cell size
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^[\d.]+$
          description: FSC value (numeric)
          examples:
            - 316.0
            - 250

  - name: characteristics[side scatter]
    ontology_accession: PRIDE:0000938
    description: Side scatter (SSC) value from flow cytometry - proxy for cell granularity/complexity
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^[\d.]+$
          description: SSC value (numeric)
          examples:
            - 301.0
            - 184

  - name: characteristics[enrichment marker]
    ontology_accession: PRIDE:0000940
    description: Markers used for cell sorting/enrichment with optional intensity values
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Enrichment marker(s) and optional intensity
          examples:
            - CD45+
            - GFP+
            - CD3+CD4+
            - CD34:APC-Cy7-A=276.0
            - PI-

  # ==========================================================================
  # OPTIONAL COLUMNS - Cell State and Quality
  # ==========================================================================

  - name: characteristics[cell viability]
    ontology_accession: CMPO:0000013
    description: Viability status of the cell at isolation
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: values
        params:
          values:
            - live
            - viable
            - dead
            - unknown
          error_level: warning
          description: Cell viability status

  - name: characteristics[cell cycle phase]
    ontology_accession: GO:0022403
    description: Cell cycle phase if determined (e.g., by FACS or computational inference)
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: values
        params:
          values:
            - G1
            - S
            - G2
            - G2/M
            - M
            - G0
            - not determined
          error_level: warning
          description: Cell cycle phase

  - name: characteristics[cell diameter]
    ontology_accession: OBA:0000048
    description: Physical diameter of the isolated cell if measured (in micrometers)
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [um, μm]
          error_level: error
          description: Cell diameter with unit
          examples:
            - 15 um
            - 20.5 um
            - 12 μm

  # ==========================================================================
  # OPTIONAL COLUMNS - Spatial Information
  # ==========================================================================

  - name: comment[spatial coordinates]
    ontology_accession: PRIDE:0000939
    description: X,Y coordinates if cells were isolated from a spatial context (e.g., LCM from tissue)
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^X=[\d.]+;Y=[\d.]+$
          description: Spatial coordinates
          examples:
            - X=100;Y=250
            - X=50.5;Y=120.3

  - name: comment[tissue section]
    ontology_accession: NCIT:C158415
    description: Tissue section identifier for spatially resolved single-cell proteomics
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Tissue section identifier
          examples:
            - section_001
            - slide_A_section_3

  # ==========================================================================
  # OPTIONAL COLUMNS - Isolation Method-Specific Parameters
  # ==========================================================================

  - name: comment[facs nozzle size]
    ontology_accession: PRIDE:0000981
    description: Nozzle diameter used for FACS-based single cell isolation (in micrometers)
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [um, μm]
          error_level: warning
          description: Nozzle size with unit
          examples:
            - 70 um
            - 100 um
            - 130 μm

  - name: comment[facs sorting mode]
    ontology_accession: PRIDE:0000982
    description: Sorting mode used during FACS isolation
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: values
        params:
          values:
            - single cell
            - purity
            - yield
            - 4-way purity
          error_level: warning
          description: FACS sorting mode

  - name: comment[microfluidics chip type]
    ontology_accession: PRIDE:0000983
    description: Type and manufacturer of the microfluidics chip used for single cell isolation
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Chip type/manufacturer identifier
          examples:
            - Fluidigm C1
            - Cellenion cellenCHIP
            - nanowell chip

  - name: comment[lcm microscope model]
    ontology_accession: PRIDE:0000984
    description: Model of the laser capture microdissection microscope used for cell isolation
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: LCM microscope model name
          examples:
            - Leica LMD7
            - Zeiss PALM MicroBeam
            - Thermo LCM

  - name: comment[nanopots chip version]
    ontology_accession: PRIDE:0000985
    description: Version of the nanoPOTS chip used for single cell sample preparation
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: nanoPOTS chip version identifier
          examples:
            - nanoPOTS v1
            - nanoPOTS v2
            - 9-well chip


