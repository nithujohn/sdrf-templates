name: invertebrates
description: SDRF template for invertebrate samples (Drosophila, C. elegans, insects, etc.). Must be combined with a technology template (ms-proteomics or affinity-proteomics).
documentation: |
  The invertebrates template covers Drosophila, C. elegans, insects, and other arthropods.

  Key guidance:
  - `characteristics[strain or breed]`: Required. Use standard strain names
    (Oregon-R, w1118, Canton-S for Drosophila; N2, Bristol for C. elegans).
  - `characteristics[developmental stage]`: Required. Use organism-specific ontologies:
    FBdv for Drosophila, WBls for C. elegans, or general EFO/UBERON terms.
  - `characteristics[genotype]`: Optional. Use standard genetic notation
    (wild type, daf-2(e1370), w[*]; P{GAL4}).
  - `characteristics[disease]`: Required.

  Mutually exclusive with human, vertebrates, and plants.
contributors:
  - Yasset Perez-Riverol (yperez@ebi.ac.uk) - EMBL-EBI
  - Deepti Jaiswal Kundu (jaiswal@ebi.ac.uk) - EMBL-EBI
  - Nithu Sara John (nithu@ebi.ac.uk) - EMBL-EBI
  - Nandana Madhusoodanan (nandana@ebi.ac.uk) - EMBL-EBI
  - Asier Larrea (alarre@ebi.ac.uk) - EMBL-EBI
  - Toan Phung (TPhung001@dundee.ac.uk) - University of Dundee
  - Timo Sachsenberg (timo.sachsenberg@uni-tuebingen.de) - University of Tübingen
version: 1.1.0
extends: sample-metadata@>=1.0.0
usable_alone: false
layer: sample
mutually_exclusive_with:
  - human
  - vertebrates
  - plants
columns:
  - name: characteristics[disease]
    ontology_accession: MONDO:0000001
    requirement: required

  - name: characteristics[developmental stage]
    ontology_accession: EFO:0000399
    description: Developmental stage of the organism
    requirement: required
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - efo
          error_level: warning
          description: The developmental stage should be a valid EFO ontology term
          examples:
            - adult stage
            - larval stage
            - pupal stage
            - embryonic stage

  - name: characteristics[strain or breed]
    ontology_accession: GENO:0000112
    description: Strain of the organism
    requirement: required
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - ncbitaxon
          error_level: warning
          description: The strain should be documented
          examples:
            - Oregon-R
            - w1118
            - N2
            - Canton-S

  - name: characteristics[genotype]
    ontology_accession: EFO:0000513
    description: Genotype of the organism
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Genotype notation following standard conventions
          examples:
            - wild type
            - daf-2(e1370)
            - w[*]; P{GAL4}

