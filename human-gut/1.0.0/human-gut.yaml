name: human-gut
description: >
  SDRF template for human gut metaproteomics. Extends metaproteomics with
  host-associated columns aligned with the GSC MIxS human-gut extension (0016004).
  Combine with ms-proteomics for MS acquisition columns.
documentation: |
  The human-gut template adds host-associated metadata fields from the MIxS
  human-gut extension. These columns describe the host organism, its health
  status, diet, and other clinical context relevant to gut microbiome studies.

  PRIDE ontology terms (PRIDE:0000674 children) include MIxS cross-references.

  Usage: human-gut + ms-proteomics
contributors:
  - Yasset Perez-Riverol (yperez@ebi.ac.uk) - EMBL-EBI
  - Deepti Jaiswal Kundu (jaiswal@ebi.ac.uk) - EMBL-EBI
  - Nithu Sara John (nithu@ebi.ac.uk) - EMBL-EBI
  - Nandana Madhusoodanan (nandana@ebi.ac.uk) - EMBL-EBI
  - Asier Larrea (alarre@ebi.ac.uk) - EMBL-EBI
  - Toan Phung (TPhung001@dundee.ac.uk) - University of Dundee
  - Timo Sachsenberg (timo.sachsenberg@uni-tuebingen.de) - University of Tübingen
version: 1.0.0
extends: metaproteomics@>=1.0.0
usable_alone: false
layer: sample
mutually_exclusive_with:
  - soil
  - water
columns:
  # ==========================================================================
  # REQUIRED COLUMNS - Host Identity
  # ==========================================================================

  - name: source name[sample name]
    ontology_accession: PRIDE:0000623
    description: Reference to the Sample. This term is used for cross-reference samples in SDRF for proteomics (MIXS:0001107).
    requirement: required
    allow_not_applicable: true
    allow_not_available: false
    validators:
      - validator_name: identifier
        params:
          charset: "[A-Za-z0-9_.-]"
          special_values: [anonymized]
          error_level: error
          description: sample name identifier
          examples:
            - Sample 1
            - Sample 2

  - name: characteristics[host organism]
    ontology_accession: PRIDE:0000998
    description: Host organism for host-associated microbiome samples
    requirement: required
    allow_not_applicable: true
    allow_not_available: false
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - ncbitaxon
          error_level: warning
          description: Should be a valid NCBI Taxonomy term
          examples:
            - Homo sapiens

  # ==========================================================================
  # RECOMMENDED COLUMNS - Host Clinical Context
  # ==========================================================================

  - name: characteristics[host subject id]
    ontology_accession: PRIDE:0000680
    description: De-identified unique identifier for the host subject. Corresponds to MIxS host_subject_id (MIXS:0000861).
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: identifier
        params:
          charset: "[A-Za-z0-9_.-]"
          special_values: [anonymized]
          error_level: error
          description: Host subject identifier
          examples:
            - subject_001
            - patient_A
            - anonymized

  - name: characteristics[host disease status]
    ontology_accession: PRIDE:0000682
    description: Host disease diagnoses. Corresponds to MIxS host_disease_stat (MIXS:0000031).
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - mondo
            - doid
          error_level: warning
          description: Should be a valid disease ontology term
          examples:
            - inflammatory bowel disease
            - colorectal cancer
            - healthy

  - name: characteristics[host body site]
    ontology_accession: PRIDE:0000685
    description: Body site where sample was obtained. Corresponds to MIxS host_body_site (MIXS:0000867).
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - uberon
            - bto
          error_level: warning
          description: Body site should be a valid UBERON or BTO term
          examples:
            - stool
            - oral cavity
            - colon

  - name: characteristics[host genotype]
    ontology_accession: PRIDE:0000692
    description: Observed genotype MIXS:0000365.
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - efo
            - gene
          error_level: warning
          description: should be a valid genotype ontology term
          examples:
            - homozygous
            - heterozygous

  - name: characteristics[host phenotype]
    ontology_accession: PRIDE:0000693
    description: Phenotype of human or other host MIXS:0000274.
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - pato
            - hp
          error_level: warning
          description: Phenotype should be a valid PATO or HP term
          examples:
            - polydactyly
            - arachnodactyly
  # ==========================================================================
  # OPTIONAL COLUMNS - Host Demographics
  # ==========================================================================

  - name: characteristics[host age]
    ontology_accession: PRIDE:0000681
    description: Age of host at the time of sampling. Corresponds to MIxS host_age (MIXS:0000255).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^\d+[YMWDH]$
          description: Age in standard format (Y=year, M=month, W=week, D=day, H=hour)
          examples:
            - 45Y
            - 8W
            - 3M

  - name: characteristics[host sex]
    ontology_accession: PRIDE:0000999
    description: Sex of the host organism. Corresponds to MIxS host_sex (MIXS:0000811).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: values
        params:
          values:
            - male
            - female
            - intersex
          error_level: warning
          description: Host sex

  - name: characteristics[host body-mass index]
    ontology_accession: PRIDE:0000695
    description: Body mass index (weight/height^2). Corresponds to MIxS host_body_mass_index (MIXS:0000317).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^[\d.]+$
          description: BMI numeric value
          examples:
            - "22.5"
            - "30.1"
            - "18.5"

  - name: characteristics[host height]
    ontology_accession: PRIDE:0000688
    description: Height of the host. Corresponds to MIxS host_height (MIXS:0000264).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [cm, m]
          error_level: warning
          description: Host height with unit
          examples:
            - 175 cm
            - 1.75 m

  - name: characteristics[host total mass]
    ontology_accession: PRIDE:0000687
    description: Total mass of the host. Corresponds to MIxS host_tot_mass (MIXS:0000263).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [kg, g]
          error_level: warning
          description: Host mass with unit
          examples:
            - 70 kg
            - 85 kg

  - name: characteristics[ethnicity]
    ontology_accession: PRIDE:0000696
    description: Ethnicity of the host. Corresponds to MIxS ethnicity (MIXS:0000895).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Ethnicity description
          examples:
            - European
            - East Asian
            - African

  # ==========================================================================
  # OPTIONAL COLUMNS - Host Diet and Lifestyle
  # ==========================================================================

  - name: characteristics[host diet]
    ontology_accession: PRIDE:0000689
    description: Diet type of the host. Corresponds to MIxS host_diet (MIXS:0000869).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Diet description
          examples:
            - omnivore
            - vegan
            - western diet
            - high-fiber

  - name: characteristics[special diet]
    ontology_accession: PRIDE:0000679
    description: Special dietary restrictions. Corresponds to MIxS special_diet (MIXS:0000905).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Special diet description
          examples:
            - gluten-free
            - low FODMAP
            - ketogenic

  - name: characteristics[host last meal]
    ontology_accession: PRIDE:0000690
    description: Content of last meal and time since feeding. Corresponds to MIxS host_last_meal (MIXS:0000870).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Last meal description
          examples:
            - breakfast 4 hours prior
            - fasting 12 hours

  - name: characteristics[host family relationship]
    ontology_accession: PRIDE:0000691
    description: Relationships to other hosts in the same study; can include multiple relationships MIXS:0000872.
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: family relationship description
          examples:
            - father
            - daughter

  - name: characteristics[host occupation]
    ontology_accession: PRIDE:0000697
    description: Most frequent job performed by subject MIXS:0000896.
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: occupation description
          examples:
            - teacher
            - engineer
  # ==========================================================================
  # OPTIONAL COLUMNS - Host Clinical
  # ==========================================================================

  - name: characteristics[gastrointestinal tract disorder]
    ontology_accession: PRIDE:0000677
    description: History of GI tract disorders. Corresponds to MIxS gastroint_disord (MIXS:0000280).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: GI disorder description
          examples:
            - Crohn's disease
            - ulcerative colitis
            - irritable bowel syndrome
            - none

  - name: characteristics[liver disorder]
    ontology_accession: PRIDE:0000678
    description: History of liver disorders. Corresponds to MIxS liver_disord (MIXS:0000282).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Liver disorder description
          examples:
            - none
            - fatty liver disease
            - hepatitis

  - name: characteristics[antibiotic treatment]
    ontology_accession: PRIDE:0001000
    description: Recent antibiotic exposure of the host
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Antibiotic treatment description
          examples:
            - none
            - amoxicillin 7 days prior
            - broad-spectrum

  - name: characteristics[ihmc medication code]
    ontology_accession: PRIDE:0000683
    description: Medication codes (IHMC). Corresponds to MIxS ihmc_medication_code (MIXS:0000884).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Medication code(s)
          examples:
            - none
            - A02BC01
            - N02BE01

  - name: characteristics[host body product]
    ontology_accession: PRIDE:0000686
    description: Substance produced by the body where sample was obtained. Corresponds to MIxS host_body_product (MIXS:0000888).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Body product description
          examples:
            - stool
            - mucus
            - saliva

  - name: characteristics[host body temperature]
    ontology_accession: PRIDE:0000694
    description: Core body temperature at sample collection. Corresponds to MIxS host_body_temp (MIXS:0000874).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: ["°C"]
          error_level: warning
          description: Body temperature in Celsius
          examples:
            - 36.6 °C
            - 37.2 °C

  - name: characteristics[perturbation]
    ontology_accession: PRIDE:0000700
    description: Type of perturbation applied. Corresponds to MIxS perturbation (MIXS:0000754).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Perturbation description
          examples:
            - antibiotic administration
            - dietary intervention
            - none

  - name: characteristics[chemical administration]
    ontology_accession: PRIDE:0000684
    description: Chemical compounds administered to the host. Corresponds to MIxS chem_administration (MIXS:0000751).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Chemical administration description
          examples:
            - metformin 500mg daily
            - probiotics
            - none

  - name: characteristics[host pulse]
    ontology_accession: PRIDE:0000699
    description: Resting pulse, measured as beats per minutes (MIXS:0000333).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: ["bpm"]
          error_level: warning
          description: Body pulse in bpm
          examples:
            - 65 bpm
            - 72 bpm
            - 85 bpm

  - name: characteristics[observed host symbionts]
    ontology_accession: PRIDE:0000708
    description: The taxonomic name of the organism(s) found living in mutualistic, commensalistic, or parasitic symbiosis with the specific host (MIXS:0001298).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: false
    validators:
      - validator_name: ontology
        params:
        ontologies:
         - ncbitaxon
        error_level: warning
        description: Should be a valid NCBI Taxonomy term
        examples:
          - Bifidobacterium
          - Lactobacillus

  - name: characteristics[medical history performed]
    ontology_accession: PRIDE:0000698
    description: Whether full medical history was collected (MIXS:0000897).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Medical history performed description
          examples:
            - 45 year old male with a 2 week history of stomach pain.

  - name: characteristics[project name]
    ontology_accession: PRIDE:0000676
    description: Name of the project within which the sequencing was organized (MIXS:0000092).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: false
    validators:
      - validator_name: identifier
        params:
          charset: "[A-Za-z0-9_.-]"
          special_values: [anonymized]
          error_level: error
          description: project name identifier
          examples:
            - Human_microbiome_project

  # ==========================================================================
  # OPTIONAL COLUMNS - Sampling and Storage
  # ==========================================================================

  - name: comment[sample storage temperature]
    ontology_accession: PRIDE:0000705
    description: Temperature at which sample was stored (MIXS:0000110).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: ["°C"]
          allow_negative: true
          error_level: warning
          description: temperature in Celsius
          examples:
            - -80 °C
            - -20 °C   

  - name: comment[sample storage location]
    ontology_accession: PRIDE:0000709
    description: Location at which sample was stored (MIXS:0000755).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: storage location description
          examples:
            - freezer
            - room

  - name: comment[sample storage duration]
    ontology_accession: PRIDE:0000707
    description: Duration for which the sample was stored (MIXS:0000116).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: storage duration description
          examples:
            - 40 days
            - 6 months      

  - name: comment[sample volume or weight for DNA extraction]
    ontology_accession: PRIDE:0000706
    description: Volume (ml) or mass (g) of total collected sample processed for DNA extraction (MIXS:0000111).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
       - validator_name: number_with_unit
         params:
          units: ["ml,g"]
          error_level: warning
          description: volume or weight of DNA extraction
          examples:
            - 1 ml
            - 2 g

  - name: comment[organism count]
    ontology_accession: PRIDE:0000704
    description: Total cell count of any organism per gram, volume, or area of sample, including count (MIXS:0000103).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: ["CFU/ml"]
          error_level: warning
          description: organism  count in CFU/ml
          examples:
            - 500 CFU/ml
            - 2000 CFU/ml

  - name: comment[oxygenation status of sample]
    ontology_accession: PRIDE:0000702
    description: Oxygenation status of sample (MIXS:0000753).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
       - validator_name: number_with_unit
          params:
          units: ["mmHg"]
          error_level: warning
          description: Oxygenation status of sample in mmHg
          examples:
            - 80 mmHg
            - 100 mmHg

  - name: comment[miscellaneous parameter]
    ontology_accession: PRIDE:0000710
    description: Any other measurement performed or parameter collected, that is not listed here (MIXS:0000752).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: miscellaneous parameter description
          examples:
            - none
