name: immunopeptidomics
description: SDRF template for immunopeptidomics experiments (MHC-bound peptide identification). Works with any organism - combine with appropriate sample template (human for HLA typing, vertebrates for H-2/MHC typing in mouse, etc.).
version: 1.0.0
extends: ms-proteomics
usable_alone: false
layer: experiment
columns:
  - name: characteristics[MHC protein complex]
    description: MHC protein complex targeted for immunopeptidome enrichment (GO:0042611)
    requirement: required
    allow_not_applicable: false
    allow_not_available: false
    validators:
      - validator_name: values
        params:
          values:
            - MHC class I protein complex
            - MHC class II protein complex
            - non-classical MHC protein complex
            - mutant MHC protein complex
            - MHC protein complex with serotype
          error_level: error
          description: MHC protein complex type should be specified (MRO terms under GO:0042611)

  - name: characteristics[immunopeptidome enrichment method]
    description: Method used to enrich MHC-bound peptides
    requirement: required
    allow_not_applicable: false
    allow_not_available: false
    validators:
      - validator_name: values
        params:
          values:
            - immunoaffinity purification
            - immunoaffinity purification (iodoacetamide)
            - mild acid elution
            - detergent lysis
          error_level: warning
          description: Enrichment method for immunopeptidome

  - name: characteristics[MHC typing]
    description: MHC alleles expressed by the sample following IPD-MHC nomenclature (https://www.ebi.ac.uk/ipd/mhc/). Use IPD-IMGT/HLA notation for human (HLA-A*02:01), H-2 notation for mouse (H-2Kb, H-2Db), or appropriate IPD-MHC notation for other species. Multiple alleles can be separated by semicolons.
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: MHC allele notation (HLA for human, H-2 for mouse). Supports multi-allele (semicolon-separated), 2-4 field resolution.
          examples:
            - HLA-A*02:01
            - HLA-B*07:02
            - HLA-A*02:01;HLA-B*07:02;HLA-C*07:02
            - HLA-A*02:01:01
            - HLA-A*02:01:01:01
            - H-2Kb
            - H-2Db
            - H-2IAb

  - name: characteristics[MHC typing method]
    description: "MHC typing method used. Values mapped to NCIT where available: NGS-based typing (NCIT:C101293), sequence-based typing (NCIT:C130180), PCR-SSO (NCIT:C130181), PCR-SSP (NCIT:C130179), PCR-based genotyping (NCIT:C17003)"
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: values
        params:
          values:
            - NGS-based typing          # NCIT:C101293 (Next Generation Sequencing)
            - sequence-based typing      # NCIT:C130180 (Sequence-based Typing)
            - PCR-SSO                    # NCIT:C130181 (Sequence-specific Oligonucleotide Probe PCR)
            - PCR-SSP                    # NCIT:C130179 (Allele Specific Primer PCR)
            - PCR-based genotyping       # NCIT:C17003 (Polymerase Chain Reaction)
            - predicted from RNA-seq
            - inferred from mass spectrometry
            - inbred strain (known genotype)
            - not available
            - not applicable
          error_level: warning
          description: "MHC typing method used. Values mapped to NCIT where available: NGS-based typing (NCIT:C101293), sequence-based typing (NCIT:C130180), PCR-SSO (NCIT:C130181), PCR-SSP (NCIT:C130179), PCR-based genotyping (NCIT:C17003)"

  - name: characteristics[antibody used]
    description: Antibody clone used for MHC immunoprecipitation
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Antibody clone name
          examples:
            - W6/32
            - BB7.2
