name: immunopeptidomics
description: SDRF template for immunopeptidomics experiments (MHC-bound peptide identification). Works with any organism - combine with appropriate sample template (human for HLA typing, vertebrates for H-2/MHC typing in mouse, etc.).
documentation: |
  The immunopeptidomics template captures MHC-bound peptidome analysis metadata for
  immunology, vaccine design, and neoantigen discovery studies.

  Key guidance:
  - `characteristics[mhc protein complex]`: Required. Specify the MHC class targeted
    (class I, class II, non-classical, mutant). Determines the expected peptide length
    distribution (class I: 8-12aa, class II: 12-25aa).
  - `characteristics[mhc typing]`: Use IPD-IMGT/HLA notation for human (HLA-A*02:01),
    H-2 notation for mouse (H-2Kb, H-2Db). Supports 2-4 field resolution and multi-allele
    semicolon-separated format (HLA-A*02:01;HLA-B*07:02;HLA-C*07:02).
  - `characteristics[mhc typing method]`: How alleles were determined (NGS-based typing,
    sequence-based typing, predicted from RNA-seq, inferred from mass spectrometry,
    inbred strain known genotype).
  - `characteristics[antibody enrichment]`: The antibody clone used for immunoprecipitation.
    Common clones: W6/32 (pan-class I), BB7.2 (HLA-A*02), Tu39 (pan-class II).
  - `characteristics[immunopeptidome enrichment method]`: The IP method used (immunoaffinity
    purification, mild acid elution, detergent lysis).

  Combine with human template for HLA typing or vertebrates for mouse H-2 typing.
