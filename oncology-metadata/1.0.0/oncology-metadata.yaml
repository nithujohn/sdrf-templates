name: oncology-metadata
description: SDRF template for cancer/oncology study samples with tumor staging, grading, and clinical outcome metadata. Extends clinical-metadata with oncology-specific columns. Combine with organism template (human, vertebrates) and technology template (ms-proteomics, affinity-proteomics).
documentation: |
  The oncology-metadata template extends clinical-metadata with cancer-specific staging,
  grading, and outcome columns. It supports multiple standardized staging systems.

  Key guidance:
  - `characteristics[disease staging]`: General disease stage (stage I-IV). Use NCIT or
    EFO terms.
  - `characteristics[tumor stage]`: TNM notation (e.g., T2N1M0). Prefix with p for
    pathological or c for clinical staging.
  - Specialized staging systems (use the appropriate column for the cancer type):
    - `characteristics[dukes stage]`: Colorectal cancer (A, B, C, D).
    - `characteristics[ann arbor stage]`: Lymphoma (I-IV with A/B/E/S suffix).
    - `characteristics[gleason score]`: Prostate cancer (sum or components: 3+4, 4+3).
    - `characteristics[weiss grade]`: Adrenal cortical carcinoma (low, high).
  - `characteristics[histologic subtype]`: Molecular/histologic classification (luminal A,
    triple-negative, adenocarcinoma, squamous cell carcinoma).
  - `characteristics[survival time]` / `characteristics[last follow up]`: Time with unit
    for clinical outcome tracking.
  - `characteristics[metastasis site]` / `characteristics[biopsy site]`: UBERON/BTO terms
    for anatomical locations.

  Inherits all clinical-metadata columns (compound, dose, treatment, demographics).
contributors:
  - Yasset Perez-Riverol (yperez@ebi.ac.uk) - EMBL-EBI
