name: water
description: >
  SDRF template for aquatic metaproteomics. Extends metaproteomics with
  water-specific columns aligned with the GSC MIxS water extension (0016014).
  Combine with ms-proteomics for MS acquisition columns.
documentation: |
  The water template adds aquatic environment metadata from the MIxS water
  extension. These columns describe water body properties, chemical/physical
  measurements, and sampling context for aquatic microbiome studies.

  PRIDE ontology terms (PRIDE:0000829 children) include MIxS cross-references.

  Usage: water + ms-proteomics
contributors:
  - Yasset Perez-Riverol (yperez@ebi.ac.uk) - EMBL-EBI
  - Deepti Jaiswal Kundu (jaiswal@ebi.ac.uk) - EMBL-EBI
  - Nithu Sara John (nithu@ebi.ac.uk) - EMBL-EBI
  - Nandana Madhusoodanan (nandana@ebi.ac.uk) - EMBL-EBI
  - Asier Larrea (alarre@ebi.ac.uk) - EMBL-EBI
  - Toan Phung (TPhung001@dundee.ac.uk) - University of Dundee
  - Timo Sachsenberg (timo.sachsenberg@uni-tuebingen.de) - University of Tübingen
version: 1.0.0
extends: metaproteomics@>=1.0.0
usable_alone: false
layer: sample
mutually_exclusive_with:
  - human-gut
  - soil
columns:
  # ==========================================================================
  # REQUIRED COLUMNS - Sample Identification
  # ==========================================================================

  - name: source name[sample name]
    ontology_accession: PRIDE:0000623
    description: Reference to the Sample. This term is used for cross-reference samples in SDRF for proteomics (MIXS:0001107).
    requirement: required
    allow_not_applicable: true
    allow_not_available: false
    validators:
      - validator_name: identifier
        params:
          charset: "[A-Za-z0-9_.-]"
          special_values: [anonymized]
          error_level: error
          description: sample name identifier
          examples:
            - Sample_1
            - Sample_2
  - name: project name
    ontology_accession: PRIDE:0000676
    description: Name of the project within which the sequencing was organized (MIXS:0000092).
    requirement: required
    allow_not_applicable: true
    allow_not_available: false
    validators:
      - validator_name: identifier
        params:
          charset: "[A-Za-z0-9_.-]"
          special_values: [anonymized]
          error_level: error
          description: project name identifier
          examples:
            - Bermuda_Atlantic_Time-series_Study
            - Metaproteomes_of_Seawater_Microbial_Communities

  # ==========================================================================
  # RECOMMENDED COLUMNS- Location and Environment
  # ==========================================================================

  - name: characteristics[sampling depth zone]
    ontology_accession: PRIDE:0001005
    description: Ecological depth zone of the sampling site
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: values
        params:
          values:
            - epipelagic
            - mesopelagic
            - bathypelagic
            - abyssopelagic
            - hadopelagic
            - benthic
            - surface
          error_level: warning
          description: Ocean depth zone

  - name: characteristics[elevation]
    ontology_accession: PRIDE:0000712
    description: Height of the sampling site above mean sea level.
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: values
        params:
          values:
            - 10 feet
            - 30 feet 
            - 2 cm
          error_level: warning
          description: elevation with unit

  - name: characteristics[tidal stage]
    ontology_accession: PRIDE:0000820
    description: Stage of tide (MIXS:0000750).
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: values
        params:
          values:
            - high tide
            - low tide 
          error_level: warning
          description: tidal stage wth term

  - name: characteristics[total depth of water volume]
    ontology_accession: PRIDE:0000821
    description: Measurement of total depth of water column (MIXS:0000634).
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          values:
            - 35 m
            - 10 m
            - 200 m
          error_level: warning
          description: total depth of water volume with unit

  - name: characteristics[water current]
    ontology_accession: PRIDE:0001006
    description: Measured speed and direction of water flow
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          values:
            - 0.35 m/s
            - 0.10 m/s 
          error_level: warning
          description: water current with unit 

  - name: characteristics[mean friction velocity]
    ontology_accession: PRIDE:0000794
    description: Measurement of mean friction velocity (MIXS:0000498).
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          values:
            - 0.035 m/s
            - 0.010 m/s 
          error_level: warning
          description: mean friction velocity with unit 

  - name: characteristics[mean peak friction velocity]
    ontology_accession: PRIDE:0000795
    description: Measurement of mean peak friction velocity (MIXS:0000502).
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          values:
            - 0.015 m/s
            - 0.045 m/s 
          error_level: warning
          description: mean peak friction velocity with unit 

  - name: characteristics[pressure]
    ontology_accession: PRIDE:0000809
    description: Pressure to which the sample is subject to, in atmospheres (MIXS:0000412)
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          values:
            - 15 dbar
            - 25 dbar 
          error_level: warning
          description: pressure with unit 

  # ==========================================================================
  # OPTIONAL COLUMNS - Physical Properties
  # ==========================================================================

  - name: characteristics[salinity]
    ontology_accession: PRIDE:0000701
    description: Salinity measurement. Corresponds to MIxS salinity (MIXS:0000183).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^[\d.]+\s*(PSU|ppt|g/L)$|^(freshwater|brackish|marine)$
          description: Salinity value with unit or descriptive term
          examples:
            - 35 PSU
            - freshwater
            - brackish

  - name: characteristics[conductivity]
    ontology_accession: PRIDE:0000776
    description: Electrical conductivity of water sample. Corresponds to MIxS conduc (MIXS:0000544).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^[\d.]+\s*(uS/cm|mS/cm|S/m)$
          description: Conductivity with unit
          examples:
            - 450 uS/cm
            - 1.2 mS/cm

  - name: characteristics[density]
    ontology_accession: PRIDE:0000777
    description: Density of the sample, which is its mass per unit volume (aka volumetric mass density) (MIXS:0000435).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [kg/m3]
          error_level: warning
          description: density with unit
          examples:
            - 1022 kg/m3
            - 1050 kg/m3

  - name: characteristics[redox potential]
    ontology_accession: PRIDE:0000811
    description: Redox potential, measured relative to a hydrogen cell, indicating oxidation or reduction potential (MIXS:0000182).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [V]
          error_level: warning
          description: redox potential with unit
          examples:
            - 1.2 V
            - 0.80 V

  - name: characteristics[fluorescence]
    ontology_accession: PRIDE:0000790
    description: Raw or converted fluorescence of water (MIXS:0000704).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [RFU]
          error_level: warning
          description: redox potential with unit
          examples:
            - 1.2 RFU
            - 3.8 RFU

  - name: characteristics[light intensity]
    ontology_accession: PRIDE:0000792
    description: Light intensity at sampling depth. Corresponds to MIxS light_intensity (MIXS:0000706).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^[\d.]+\s*(lux|umol/m2/s)$
          description: Light intensity with unit
          examples:
            - 500 lux
            - 100 umol/m2/s

  - name: characteristics[turbidity]
    ontology_accession: PRIDE:0000827
    description: Turbidity measurement. Corresponds to MIxS turbidity (MIXS:0000191).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^[\d.]+\s*(NTU|FNU)$
          description: Turbidity with unit
          examples:
            - 5.2 NTU
            - 12 FNU

  - name: characteristics[downward PAR]
    ontology_accession: PRIDE:0000789
    description: Visible waveband radiance and irradiance measurements in the water column (MIXS:0000703).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [µmol]
          error_level: warning
          description: downward PAR with unit
          examples:
            - 120 µmol
            - 15 µmol

  - name: characteristics[photon flux]
    ontology_accession: PRIDE:0000807
    description: Measurement of photon flux (MIXS:0000725).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [µmol]
          error_level: warning
          description: photon flux with unit
          examples:
            - 120 µmol
            - 15 µmol    
  # ==========================================================================
  # OPTIONAL COLUMNS - Inorganic Nutrients & Ions
  # ==========================================================================

  - name: characteristics[nitrate]
