  - name: characteristics[total phosphorus]
    ontology_accession: PRIDE:0000826
    description: total phosphorus concentration. Corresponds to MIxS total phosphorus (MIXS:0000117).
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [mg/L]
