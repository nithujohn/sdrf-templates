name: somascan
description: SDRF template for SomaScan aptamer-based proteomics experiments. Extends affinity-proteomics with SomaScan-specific columns.
documentation: |
  The somascan template captures SOMAmer (Slow Off-rate Modified Aptamer) based proteomics
  metadata for SomaScan experiments by SomaLogic/Standard BioTools.

  Key guidance:
  - `comment[somascan menu]`: Required. The aptamer panel size (SomaScan 1.1K, 1.3K, 5K,
    7K, 11K). Different menus measure different numbers of proteins.
  - `comment[somascan platform]`: Required. The assay version (SomaScan Assay, SomaScan
    Assay v4, SomaScan Assay v4.1).
  - `comment[dilution]`: Recommended. Standard dilution factors used in the assay
    (0.005%, 0.5%, 20%, 40%). SomaScan uses multiple dilutions to extend dynamic range.
  - `comment[somascan lot number]`: Optional. Reagent lot for traceability.
  - Inherited from affinity-proteomics: `characteristics[sample matrix]` (serum, plasma),
    `comment[quantification unit]` (RFU), `comment[normalization method]`.

  SomaScan data uses Relative Fluorescence Units (RFU). Multiple dilutions per sample
  are standard — each dilution may appear as a separate row.
  Mutually exclusive with olink.
contributors:
  - Yasset Perez-Riverol (yperez@ebi.ac.uk) - EMBL-EBI
  - Deepti Jaiswal Kundu (jaiswal@ebi.ac.uk) - EMBL-EBI
