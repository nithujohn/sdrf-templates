  - Nandana Madhusoodanan (nandana@ebi.ac.uk) - EMBL-EBI
  - Asier Larrea (alarre@ebi.ac.uk) - EMBL-EBI
  - Toan Phung (TPhung001@dundee.ac.uk) - University of Dundee
  - Timo Sachsenberg (timo.sachsenberg@uni-tuebingen.de) - University of Tübingen
  - Magnus Palmblad (n.m.palmblad@lumc.nl) - Leiden University Medical Center
version: 1.0.0
extends: affinity-proteomics@>=1.0.0
usable_alone: false
layer: experiment
mutually_exclusive_with:
  - olink
columns:
  - name: comment[somascan menu]
    description: SomaScan assay menu (number of aptamers/proteins measured)
    requirement: required
    allow_not_applicable: false
    allow_not_available: false
    validators:
      - validator_name: values
        params:
          values:
            - SomaScan 1.1K
            - SomaScan 1.3K
            - SomaScan 5K
            - SomaScan 7K
            - SomaScan 11K
          error_level: warning
          description: SomaScan menu version

  - name: comment[somascan platform]
    description: SomaScan instrument/platform version
    requirement: required
    allow_not_applicable: false
    allow_not_available: false
    validators:
      - validator_name: values
        params:
          values:
            - SomaScan Assay
            - SomaScan Assay v4
            - SomaScan Assay v4.1
          error_level: warning
          description: SomaScan platform version

  - name: comment[dilution]
    ontology_accession: OBI:0002483
    description: Sample dilution factor used
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^(0.005%|0.5%|20%|40%)$
          description: Standard SomaScan dilution factors
          examples:
            - 0.005%
            - 0.5%
            - 20%
            - 40%

  - name: comment[somascan lot number]
    description: Reagent lot number for traceability
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Lot number
          examples:
            - SS-2023-001
            - lot_12345
