name: plants
description: SDRF template for plant samples (Arabidopsis, crops, etc.). Must be combined with a technology template (ms-proteomics or affinity-proteomics).
documentation: |
  The plants template covers Arabidopsis thaliana, rice, maize, wheat, and other plant species.

  Key guidance:
  - `characteristics[strain or breed]`: Recommended. Use cultivar/ecotype/accession names
    (Col-0, Ler-0 for Arabidopsis; Nipponbare for rice; B73 for maize).
  - `characteristics[developmental stage]`: Required. Use Plant Ontology (PO) or EFO terms
    (seedling stage, flowering stage, rosette growth stage, senescent stage).
  - `characteristics[growth condition]`: Recommended. Free-text description of growth
    conditions (long day 16h/8h, short day, continuous light, greenhouse).
  - `characteristics[treatment]`: Recommended. Use NCIT or EFO terms for treatments
    (drought stress, salt stress, pathogen infection, hormone treatment).
  - `characteristics[disease]`: Required.

  Mutually exclusive with human, vertebrates, and invertebrates.
contributors:
  - Yasset Perez-Riverol (yperez@ebi.ac.uk) - EMBL-EBI
  - Deepti Jaiswal Kundu (jaiswal@ebi.ac.uk) - EMBL-EBI
  - Nithu Sara John (nithu@ebi.ac.uk) - EMBL-EBI
  - Nandana Madhusoodanan (nandana@ebi.ac.uk) - EMBL-EBI
  - Asier Larrea (alarre@ebi.ac.uk) - EMBL-EBI
  - Toan Phung (TPhung001@dundee.ac.uk) - University of Dundee
  - Timo Sachsenberg (timo.sachsenberg@uni-tuebingen.de) - University of Tübingen
version: 1.1.0
extends: sample-metadata@>=1.0.0
usable_alone: false
layer: sample
mutually_exclusive_with:
  - human
  - vertebrates
  - invertebrates
columns:
  - name: characteristics[organism part]
    ontology_accession: EFO:0000635
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - uberon
            - bto
            - po
          error_level: warning
          description: The organism part should be a valid UBERON, BTO, or Plant Ontology (PO) term
          examples:
            - flower bud
            - leaf
            - root
            - seed

  - name: characteristics[disease]
    ontology_accession: MONDO:0000001
    requirement: required

  - name: characteristics[developmental stage]
    ontology_accession: EFO:0000399
    description: Developmental stage of the plant
    requirement: required
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - efo
          error_level: warning
          description: The developmental stage should be a valid EFO ontology term
          examples:
            - seedling stage
            - flowering stage
            - rosette growth stage
            - senescent stage

  - name: characteristics[strain or breed]
    ontology_accession: GENO:0000112
    description: Cultivar, ecotype, or accession of the plant
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Plant cultivar or ecotype name
          examples:
            - Col-0
            - Ler-0
            - Nipponbare
            - B73

  - name: characteristics[growth condition]
    ontology_accession: EFO:0000523
    description: Growth conditions for the plant
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Description of growth conditions
          examples:
            - long day (16h light/8h dark)
            - short day (8h light/16h dark)
            - continuous light
            - greenhouse

  - name: characteristics[treatment]
    requirement: recommended

